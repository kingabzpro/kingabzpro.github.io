name: Test and Deploy Astro to GitHub Pages

on:
  push:
    branches:
      - source
  pull_request:
    branches:
      - source

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run test:content

      - name: Build Astro site
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/source'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID || 'G-C8RQZHQ428' }}
        run: npm run build

      - name: Deploy to main branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: main
          publish_dir: ./dist
